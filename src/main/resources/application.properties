spring.application.name=duke-free-food-finder-backend
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/free_food_finder}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:duke_admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

resend.api.key=${RESEND_API_KEY}

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

aws.s3.bucket=${S3_BUCKET_NAME}
aws.s3.region=${S3_REGION}

management.endpoints.web.exposure.include=health